<svg xmlns="http://www.w3.org/2000/svg" width="720" height="470" viewBox="0 0 720 470" font-family="system-ui,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#a1a1aa"/>
    </marker>
  </defs>
  <rect width="720" height="470" rx="12" fill="#09090b"/>

  <!-- START -->
  <circle cx="360" cy="56" r="40" fill="#18181b" stroke="#fafafa" stroke-width="4"/>
  <text x="360" y="54" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="700">START</text>
  <text x="360" y="70" text-anchor="middle" fill="#a1a1aa" font-size="10">1019</text>

  <!-- CONDITION 1 -->
  <rect x="270" y="128" width="180" height="70" rx="8" fill="#18181b" stroke="#fafafa" stroke-width="4"/>
  <text x="360" y="150" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="700">Condition</text>
  <text x="360" y="170" text-anchor="middle" fill="#a1a1aa" font-size="10">Verifique la presion...</text>
  <rect x="284" y="176" width="152" height="16" rx="3" fill="#27272a"/>
  <text x="360" y="188" text-anchor="middle" fill="#fafafa" font-size="9" font-family="monospace">¿Es menor a 2 bar?</text>

  <!-- DECISION -->
  <rect x="328" y="234" width="64" height="64" rx="6" fill="#18181b" stroke="#fafafa" stroke-width="4" transform="rotate(45 360 266)"/>
  <text x="360" y="270" text-anchor="middle" fill="#fafafa" font-size="11" font-weight="700">Decision</text>

  <!-- CONDITION YES -->
  <rect x="70" y="350" width="190" height="76" rx="8" fill="#18181b" stroke="#fafafa" stroke-width="4"/>
  <text x="165" y="372" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="700">Condition</text>
  <text x="165" y="392" text-anchor="middle" fill="#a1a1aa" font-size="10">Revise el sensor de presion...</text>
  <rect x="84" y="398" width="162" height="16" rx="3" fill="#27272a"/>
  <text x="165" y="410" text-anchor="middle" fill="#fafafa" font-size="9" font-family="monospace">¿La senal es correcta?</text>

  <!-- CONDITION NO -->
  <rect x="460" y="350" width="190" height="76" rx="8" fill="#18181b" stroke="#fafafa" stroke-width="4"/>
  <text x="555" y="372" text-anchor="middle" fill="#fafafa" font-size="12" font-weight="700">Condition</text>
  <text x="555" y="392" text-anchor="middle" fill="#a1a1aa" font-size="10">Presion normal. Cierre el caso.</text>
  <rect x="474" y="398" width="162" height="16" rx="3" fill="#27272a"/>
  <text x="555" y="410" text-anchor="middle" fill="#fafafa" font-size="9">Action: Create Ticket</text>

  <!-- edges -->
  <g stroke="#a1a1aa" stroke-width="2" fill="none">
    <path d="M360,96 V124" marker-end="url(#arrow)"/>
    <path d="M360,198 V228" marker-end="url(#arrow)"/>
    <path d="M335,291 C300,320 200,318 165,346" marker-end="url(#arrow)"/>
    <path d="M385,291 C420,320 520,318 555,346" marker-end="url(#arrow)"/>
  </g>
  <!-- edge labels -->
  <rect x="232" y="306" width="30" height="18" rx="4" fill="#27272a" stroke="#3f3f46"/>
  <text x="247" y="319" text-anchor="middle" fill="#fafafa" font-size="11">Si</text>
  <rect x="458" y="306" width="32" height="18" rx="4" fill="#27272a" stroke="#3f3f46"/>
  <text x="474" y="319" text-anchor="middle" fill="#fafafa" font-size="11">No</text>
</svg>
